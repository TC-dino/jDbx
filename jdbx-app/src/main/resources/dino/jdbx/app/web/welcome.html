<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="vendor/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/beekeeper.css"/>
  <title>Welcome</title>
  <style>
    .welcome {
      height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at top, #14333a 0%, #0b1c21 55%, #071a1f 100%);
      text-align: center; padding: 32px;
    }
    .welcome .logo {
      width: 64px; height: 64px; border-radius: 16px; background: var(--bk-amber);
      color: #1a1a1a; font-weight: 800; font-size: 28px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px; box-shadow: 0 8px 24px rgba(239,197,36,0.25);
    }
    .welcome h1 { color: var(--bk-text); font-size: 28px; font-weight: 700; margin: 0 0 8px; }
    .welcome p { color: var(--bk-muted); max-width: 420px; margin: 0 0 28px; line-height: 1.5; }
    .welcome .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
<div class="welcome">
  <div class="logo">j</div>
  <h1>jDbx</h1>
  <p>轻量级中间件管理工具。创建连接后即可查询、浏览表数据，界面风格对齐 Beekeeper Studio。</p>
  <div class="actions">
    <button class="btn btn-bk px-4" id="btnNewConn" type="button">+ New Connection</button>
    <button class="btn btn-bk-outline btn-outline-warning px-4" id="btnNewQuery" type="button">New Query</button>
  </div>
</div>
<script>
  window.onJdbxReady = function () {
    document.getElementById('btnNewConn').onclick = () => window.jdbx && jdbx.newConnection();
    document.getElementById('btnNewQuery').onclick = () => window.jdbx && jdbx.newQuery();
  };
  if (window.jdbx) window.onJdbxReady();
</script>
</body>
</html>
