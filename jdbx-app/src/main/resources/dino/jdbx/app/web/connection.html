<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="vendor/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/beekeeper.css"/>
  <title>New Connection</title>
  <style>
    .bk-conn-page { height: 100vh; display: flex; flex-direction: column; background: var(--bk-bg); }
    .bk-conn-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; border-bottom: 1px solid var(--bk-border); background: var(--bk-bg-deep);
    }
    .bk-conn-head h1 { margin: 0; font-size: 16px; color: var(--bk-text); font-weight: 600; }
    .bk-conn-body { flex: 1; overflow: auto; padding: 18px; }
    .bk-conn-foot {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 12px 18px; border-top: 1px solid var(--bk-border); background: var(--bk-bg-deep);
    }
    .form-label { color: var(--bk-muted); font-size: 12px; margin-bottom: 4px; }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 6px; border: 2px solid transparent;
      cursor: pointer; display: inline-block;
    }
    .color-swatch.active { border-color: #fff; box-shadow: 0 0 0 2px var(--bk-amber); }
    #msg { min-height: 20px; font-size: 12px; }
  </style>
</head>
<body>
<div class="bk-conn-page">
  <div class="bk-conn-head">
    <h1 id="title">New Connection</h1>
    <button type="button" class="btn btn-sm btn-bk-outline btn-outline-warning" id="btnCancelTop">关闭</button>
  </div>
  <div class="bk-conn-body">
    <input type="hidden" id="id"/>
    <div class="mb-3">
      <label class="form-label">Connection Type</label>
      <select class="form-select bk-input" id="type"></select>
    </div>
    <div class="mb-3">
      <label class="form-label">Connection Name</label>
      <input class="form-control bk-input" id="name" placeholder="My Database"/>
    </div>
    <div class="row g-2 mb-3">
      <div class="col-8">
        <label class="form-label">Host</label>
        <input class="form-control bk-input" id="host" placeholder="localhost" value="localhost"/>
      </div>
      <div class="col-4">
        <label class="form-label">Port</label>
        <input class="form-control bk-input" id="port" placeholder="3306"/>
      </div>
    </div>
    <div class="row g-2 mb-3">
      <div class="col-6">
        <label class="form-label">User</label>
        <input class="form-control bk-input" id="username" placeholder="root"/>
      </div>
      <div class="col-6">
        <label class="form-label">Password</label>
        <input type="password" class="form-control bk-input" id="password"/>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Default Database</label>
      <input class="form-control bk-input" id="database" placeholder="database"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Color</label>
      <div id="colors" class="d-flex gap-2 flex-wrap"></div>
    </div>
    <div class="form-check mb-2">
      <input class="form-check-input" type="checkbox" id="ssl"/>
      <label class="form-check-label text-secondary" for="ssl">Use SSL</label>
    </div>
    <div id="msg" class="text-secondary"></div>
  </div>
  <div class="bk-conn-foot">
    <button type="button" class="btn btn-bk-outline btn-outline-warning" id="btnTest">Test</button>
    <button type="button" class="btn btn-bk" id="btnSave">Save</button>
  </div>
</div>
<script src="vendor/bootstrap.bundle.min.js"></script>
<script src="js/connection.js"></script>
</body>
</html>
